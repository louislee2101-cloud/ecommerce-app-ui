<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=375px, initial-scale=1.0"/>
  <title>登录页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 375px;
      height: 812px;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #fff;
    }
    .top-bg {
      width: 100%;
      height: 280px;
      background: linear-gradient(145deg, #FF6B6B, #FF8E53);
      border-radius: 0 0 50px 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .top-bg .circle {
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      top: -40px; right: -40px;
    }
    .top-logo { font-size: 48px; margin-bottom: 12px; }
    .top-title { font-size: 26px; font-weight: 800; color: #fff; }
    .top-sub { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; }

    .form-wrap {
      padding: 36px 28px 0;
    }
    .form-title { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 6px; }
    .form-sub { font-size: 13px; color: #999; margin-bottom: 28px; }

    .input-group { margin-bottom: 18px; }
    .input-label { font-size: 13px; color: #555; margin-bottom: 8px; display: block; }
    .input-field {
      width: 100%;
      height: 50px;
      background: #f7f7f7;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 0 16px;
      font-size: 15px;
      color: #333;
      outline: none;
    }
    .input-field:focus { border-color: #FF6B6B; background: #fff; }

    .forgot { text-align: right; font-size: 13px; color: #FF6B6B; margin-bottom: 28px; }

    .btn-login {
      width: 100%;
      height: 52px;
      background: linear-gradient(90deg, #FF6B6B, #FF8E53);
      border: none;
      border-radius: 26px;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,107,107,0.4);
      margin-bottom: 24px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider-line { flex: 1; height: 1px; background: #eee; }
    .divider-text { font-size: 12px; color: #bbb; }

    .social-btns { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
    .social-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: #fff;
    }

    .register-tip { text-align: center; font-size: 13px; color: #999; }
    .register-tip span { color: #FF6B6B; font-weight: 600; }
  </style>
</head>
<body>
  <div class="top-bg">
    <div class="circle"></div>
    <div class="top-logo">🛍️</div>
    <div class="top-title">ShopJoy</div>
    <div class="top-sub">欢迎回来！</div>
  </div>
  <div class="form-wrap">
    <div class="form-title">登录账号</div>
    <div class="form-sub">请输入您的账号和密码</div>
    <div class="input-group">
      <label class="input-label">手机号 / 邮箱</label>
      <input class="input-field" type="text" placeholder="请输入手机号或邮箱"/>
    </div>
    <div class="input-group">
      <label class="input-label">密码</label>
      <input class="input-field" type="password" placeholder="请输入密码"/>
    </div>
    <div class="forgot">忘记密码？</div>
    <button class="btn-login">立即登录</button>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">其他方式登录</div>
      <div class="divider-line"></div>
    </div>
    <div class="social-btns">
      <div class="social-btn">💬</div>
      <div class="social-btn">📱</div>
      <div class="social-btn">🍎</div>
    </div>
    <div class="register-tip">还没有账号？<span>立即注册</span></div>
  </div>
</body>
</html>
