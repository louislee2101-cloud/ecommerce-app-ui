<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=375px, initial-scale=1.0"/>
  <title>购物车</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 375px;
      height: 812px;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: #fff;
      padding: 48px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #222; }
    .header-edit { font-size: 14px; color: #FF6B6B; }

    .content { height: 620px; overflow-y: auto; padding: 12px 16px; }

    /* 店铺分组 */
    .shop-group {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .shop-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .shop-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #FF6B6B;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }
    .shop-name { font-size: 14px; font-weight: 600; color: #333; }

    .cart-item { display: flex; gap: 12px; margin-bottom: 14px; }
    .item-img {
      width: 80px; height: 80px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      flex-shrink: 0;
    }
    .item-info { flex: 1; }
    .item-name { font-size: 14px; color: #333; margin-bottom: 4px; }
    .item-spec { font-size: 12px; color: #999; margin-bottom: 8px; }
    .item-bottom { display: flex; align-items: center; justify-content: space-between; }
    .item-price { font-size: 16px; font-weight: 700; color: #FF6B6B; }
    .qty-ctrl { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #555;
    }
    .qty-num { font-size: 15px; font-weight: 600; color: #333; }

    /* 推荐 */
    .recommend-title { font-size: 15px; font-weight: 700; color: #222; margin: 8px 0 12px; }
    .recommend-list { display: flex; gap: 10px; overflow-x: auto; }
    .rec-card {
      min-width: 100px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .rec-img {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .rec-info { padding: 6px 8px; }
    .rec-name { font-size: 11px; color: #333; margin-bottom: 2px; }
    .rec-price { font-size: 13px; font-weight: 700; color: #FF6B6B; }

    /* 底部结算 */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      width: 375px;
      background: #fff;
      padding: 12px 20px 24px;
      display: flex;
      align-items: center;
      border-top: 1px solid #f0f0f0;
    }
    .select-all { display: flex; align-items: center; gap: 8px; margin-right: auto; }
    .select-all-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #FF6B6B;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
    }
    .select-all-text { font-size: 14px; color: #333; }
    .total-wrap { margin-right: 16px; }
    .total-label { font-size: 12px; color: #999; }
    .total-price { font-size: 20px; font-weight: 800; color: #FF6B6B; }
    .checkout-btn {
      background: linear-gradient(90deg, #FF6B6B, #FF8E53);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 24px;
      border: none;
      box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">购物车 🛒</div>
    <div class="header-edit">编辑</div>
  </div>

  <div class="content">
    <div class="shop-group">
      <div class="shop-header">
        <div class="shop-check">✓</div>
        <div class="shop-name">🏪 ShopJoy 官方旗舰店</div>
      </div>
      <div class="cart-item">
        <div class="item-img" style="background:#FFF0F0;">👗</div>
        <div class="item-info">
          <div class="item-name">夏季清新连衣裙</div>
          <div class="item-spec">颜色：红色 · 尺码：S</div>
          <div class="item-bottom">
            <div class="item-price">¥199</div>
            <div class="qty-ctrl">
              <div class="qty-btn">−</div>
              <div class="qty-num">1</div>
              <div class="qty-btn">+</div>
            </div>
          </div>
        </div>
      </div>
      <div class="cart-item">
        <div class="item-img" style="background:#FFF5E0;">👟</div>
        <div class="item-info">
          <div class="item-name">轻便运动跑鞋</div>
          <div class="item-spec">颜色：白色 · 尺码：38</div>
          <div class="item-bottom">
            <div class="item-price">¥399</div>
            <div class="qty-ctrl">
              <div class="qty-btn">−</div>
              <div class="qty-num">2</div>
              <div class="qty-btn">+</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="recommend-title">猜你喜欢</div>
    <div class="recommend-list">
      <div class="rec-card">
        <div class="rec-img" style="background:#F0FFF4;">🏠</div>
        <div class="rec-info"><div class="rec-name">北欧风台灯</div><div class="rec-price">¥89</div></div>
      </div>
      <div class="rec-card">
        <div class="rec-img" style="background:#FFF0FA;">💄</div>
        <div class="rec-info"><div class="rec-name">口红套装</div><div class="rec-price">¥159</div></div>
      </div>
      <div class="rec-card">
        <div class="rec-img" style="background:#F0F7FF;">📱</div>
        <div class="rec-info"><div class="rec-name">手机支架</div><div class="rec-price">¥29</div></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="select-all">
      <div class="select-all-check">✓</div>
      <div class="select-all-text">全选</div>
    </div>
    <div class="total-wrap">
      <div class="total-label">合计</div>
      <div class="total-price">¥997</div>
    </div>
    <button class="checkout-btn">结算(3)</button>
  </div>
</body>
</html>
