<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=375px, initial-scale=1.0"/>
  <title>启动页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 375px;
      height: 812px;
      overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(145deg, #FF6B6B, #FF8E53, #FFC947);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .circle1 {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      top: -80px; right: -80px;
    }
    .circle2 {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      bottom: -50px; left: -50px;
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }
    .logo-icon {
      width: 100px; height: 100px;
      background: #fff;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      margin-bottom: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .logo-name {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .logo-slogan {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2px;
    }
    .loading-wrap {
      position: absolute;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .loading-bar {
      width: 160px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar-inner {
      width: 70%;
      height: 100%;
      background: #fff;
      border-radius: 2px;
    }
    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="logo-wrap">
    <div class="logo-icon">🛍️</div>
    <div class="logo-name">ShopJoy</div>
    <div class="logo-slogan">快乐购物，每一天</div>
  </div>
  <div class="loading-wrap">
    <div class="loading-bar"><div class="loading-bar-inner"></div></div>
    <div class="loading-text">正在加载...</div>
  </div>
</body>
</html>
